prefect-version: 3.0.0
name: prefect-spark-eks

deployments:
  - name: eks-spark-s3-demo-flow-1
    version: "1"
    entrypoint: pipelines/flows/etl.py:etl_pipeline
    build: []
    push: []
    pull:
      - prefect.deployments.steps.set_working_directory:
          directory: /opt/prefect
      - prefect_aws.deployments.steps.pull_from_s3:
          bucket: "{{ $SCRIPT_BUCKET }}"
          folder: ""
      - prefect_aws.deployments.steps.pull_from_s3:
          bucket: "{{ $SCRIPT_BUCKET }}"
          folder: "{{ $SPARK_CONFIGS_PREFIX }}"
    parameters:
      job_name: etl_job_1
      dq_job_name: etl_job_1_dq
      spark_namespace: spark-jobs
      cleanup: true
      cleanup_on_failure: false
      poll_seconds: 15
      timeout_seconds: 1800
      log_db: postgres
    work_pool:
      name: "{{ $PREFECT_WORK_POOL_NAME }}"
      work_queue_name: "{{ $PREFECT_WORK_QUEUE_NAME }}"
      job_variables:
        namespace: prefect
        image: "{{ $PREFECT_IMAGE_NAME }}:{{ $PREFECT_IMAGE_TAG }}"
        image_pull_policy: Always
        service_account_name: prefect-flow-run
        env:
          SCRIPT_BUCKET: "{{ $SCRIPT_BUCKET }}"
          SPARK_JOB_KEY: "s3a://{{ $SCRIPT_BUCKET }}/{{ $SPARK_JOBS_PREFIX }}/etl_job_1.py"
          SPARK_DQ_CHECKS_KEY: "s3a://{{ $SCRIPT_BUCKET }}/{{ $SPARK_JOBS_PREFIX }}/etl_job_1_dq.py"
          SPARK_NAMESPACE: spark-jobs
          SPARK_IMAGE: "{{ $SPARK_IMAGE_NAME }}:{{ $SPARK_IMAGE_TAG }}"
          SPARK_APPLICATION_FILE: /opt/prefect/spark/app-template.yaml
          SPARK_JOB_CONFIG_FILE: /opt/prefect/spark/app-config.yaml
          SENDER_EMAIL: "khoitrlmn@gmail.com"
          RECEIVER_EMAIL: "23021603@vnu.edu.vn"

